name: iOS build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ios/MeteoScope/**"
      - "ios/MeteoScopeTests/**"
      - "ios/Scripts/**"
      - "ios/Docs/**"
      - "ios/project.yml"
      - "public/privacy.html"
      - "public/terms.html"
      - "public/support.html"
      - "public/data/usgs-slab2-depth-contours-japan.geojson"
      - "workers/earthquake-realtime/**"
      - "functions/api/earthquakes/**"
      - "functions/api/quiz/**"
      - "functions/_shared/adminManagement.js"
      - "functions/_shared/quizLeaderboardCache.js"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/MeteoScope/**"
      - "ios/MeteoScopeTests/**"
      - "ios/Scripts/**"
      - "ios/Docs/**"
      - "ios/project.yml"
      - "public/privacy.html"
      - "public/terms.html"
      - "public/support.html"
      - "public/data/usgs-slab2-depth-contours-japan.geojson"
      - "workers/earthquake-realtime/**"
      - "functions/api/earthquakes/**"
      - "functions/api/quiz/**"
      - "functions/_shared/adminManagement.js"
      - "functions/_shared/quizLeaderboardCache.js"
      - ".github/workflows/ios-build.yml"

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.label }})
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: iOS 18.5 / Xcode 16.4
            developer_dir: /Applications/Xcode_16.4.app/Contents/Developer
            device: iPhone 16 Pro
            os: "18.5"
          - label: iOS 26.2 / Xcode 26.2
            developer_dir: /Applications/Xcode_26.2.app/Contents/Developer
            device: iPhone 17 Pro
            os: "26.2"
    env:
      DEVELOPER_DIR: ${{ matrix.developer_dir }}
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Report toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version

      - name: Generate project
        run: xcodegen generate

      - name: Validate source and policy assets
        shell: pwsh
        run: ./Scripts/Validate-IOSSource.ps1

      - name: Resolve packages
        run: >-
          xcodebuild
          -project MeteoScope.xcodeproj
          -scheme MeteoScope
          -resolvePackageDependencies

      - name: Build and test
        run: >-
          xcodebuild test
          -project MeteoScope.xcodeproj
          -scheme MeteoScope
          -destination 'platform=iOS Simulator,name=${{ matrix.device }},OS=${{ matrix.os }}'
          -destination-timeout 120
          -parallel-testing-enabled NO
          CODE_SIGNING_ALLOWED=NO
