name = "meteoscope-earthquake-realtime"
main = "src/index.js"
compatibility_date = "2026-07-15"

[vars]
DMDATA_APP_NAME = "meteoscope-earthquake"
DMDATA_TEST_MODE = "excluding"

[triggers]
# Cloudflare Cron is UTC. 15:00 UTC is 00:00 JST on the following day.
crons = ["0 15 * * *"]

[[durable_objects.bindings]]
name = "EARTHQUAKE_HUB"
class_name = "MeteoScopeEarthquakeHub"

# This is a MeteoScope-owned Durable Object namespace. It does not share the
# retired legacy Worker or its Durable Object namespace.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["MeteoScopeEarthquakeHub"]

[[d1_databases]]
binding = "EQ_D1"
database_name = "meteoscope-earthquakes"
database_id = "3528edad-c190-42d7-8130-e82007abc14e"
